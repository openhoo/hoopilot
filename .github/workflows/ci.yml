name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  HOOVERSION_VERSION: 0.1.1

jobs:
  commitlint:
    name: Lint commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Lint commits
        uses: openhoo/hooversion/actions/lint@f5ee7eef255519b4ef33f4a93c7223805113c3a2
        with:
          version: ${{ env.HOOVERSION_VERSION }}
          bun-version: 1.3.14

  build:
    name: Test and build
    runs-on: ubuntu-latest
    needs: commitlint
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint, format, tests, and build
        run: bun run check

      - name: Smoke-test standalone Linux binary
        run: |
          set -euo pipefail
          version="$(bun --print 'require("./package.json").version')"
          mkdir -p dist/bin
          bun build src/cli.ts \
            --compile \
            --target=bun-linux-x64 \
            --define "HOOPILOT_VERSION=\"${version}\"" \
            --define 'HOOPILOT_TARGET="linux-x64"' \
            --outfile dist/bin/hoopilot-linux-x64
          test "$("./dist/bin/hoopilot-linux-x64" --version)" = "$version"

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: commitlint
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: hoopilot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        run: |
          set -euo pipefail
          api_key="ci-smoke-key-0123456789abcdef"
          tmpdir="$(mktemp -d)"
          mock_port=5159
          cleanup() {
            docker rm -f hoopilot-smoke >/dev/null 2>&1 || true
            if [ -n "${mock_pid:-}" ]; then
              kill "$mock_pid" >/dev/null 2>&1 || true
            fi
            rm -rf "$tmpdir"
          }
          trap cleanup EXIT

          printf '{"token":"oauth-token","apiBaseUrl":"http://127.0.0.1:%s"}\n' "$mock_port" > "$tmpdir/auth.json"
          chmod 755 "$tmpdir"
          chmod 644 "$tmpdir/auth.json"
          node -e "require('node:http').createServer((req,res)=>{if(req.url==='/models'){if(req.headers.authorization!=='Bearer oauth-token'){res.statusCode=401;res.end('unauthorized');return;}res.setHeader('content-type','application/json');res.end(JSON.stringify({data:[{id:'ci-smoke-model',object:'model'}]}));return;}res.statusCode=404;res.end('not found');}).listen($mock_port,'127.0.0.1');" &
          mock_pid="$!"
          mock_ok=0
          for _ in $(seq 1 15); do
            if curl -fsS -H "authorization: Bearer oauth-token" \
              "http://127.0.0.1:${mock_port}/models" >/dev/null; then
              mock_ok=1
              break
            fi
            sleep 1
          done
          if [ "$mock_ok" != "1" ]; then
            echo "Smoke test failed: mock Copilot API did not start" >&2
            exit 1
          fi
          docker run -d --name hoopilot-smoke \
            --network host \
            -e HOOPILOT_API_KEY="$api_key" \
            -e HOOPILOT_AUTH_FILE=/data/auth.json \
            -e COPILOT_API_BASE_URL="http://127.0.0.1:${mock_port}" \
            -v "$tmpdir:/data:ro" \
            hoopilot:ci
          ok=0
          for _ in $(seq 1 15); do
            if curl -fsS -H "x-api-key: $api_key" \
              http://127.0.0.1:4141/healthz >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 1
          done
          docker logs hoopilot-smoke || true
          if [ "$ok" != "1" ]; then
            echo "Smoke test failed: /healthz did not return 200" >&2
            exit 1
          fi
          curl -fsS -H "x-api-key: $api_key" \
            http://127.0.0.1:4141/v1/models | grep -q '"ci-smoke-model"'
