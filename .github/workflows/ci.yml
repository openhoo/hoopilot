name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  HOOVERSION_VERSION: 0.1.1

jobs:
  commitlint:
    name: Lint commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Lint commits
        uses: openhoo/hooversion/actions/lint@f5ee7eef255519b4ef33f4a93c7223805113c3a2
        with:
          version: ${{ env.HOOVERSION_VERSION }}
          bun-version: 1.3.14

  build:
    name: Test and build
    runs-on: ubuntu-latest
    needs: commitlint
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint, format, tests, and build
        run: bun run check

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: commitlint
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: true
          tags: hoopilot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        run: |
          set -euo pipefail
          docker run -d --name hoopilot-smoke \
            -e HOOPILOT_API_KEY=ci-smoke-key -p 4141:4141 hoopilot:ci
          ok=0
          for _ in $(seq 1 15); do
            if curl -fsS -H "x-api-key: ci-smoke-key" \
              http://127.0.0.1:4141/healthz >/dev/null 2>&1; then
              ok=1
              break
            fi
            sleep 1
          done
          docker logs hoopilot-smoke || true
          docker rm -f hoopilot-smoke >/dev/null 2>&1 || true
          if [ "$ok" != "1" ]; then
            echo "Smoke test failed: /healthz did not return 200" >&2
            exit 1
          fi
