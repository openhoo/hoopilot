name: Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

env:
  HOOVERSION_VERSION: 0.1.1

jobs:
  release:
    name: Release
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && !contains(github.event.workflow_run.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    outputs:
      current: ${{ steps.current.outputs.current }}
      published: ${{ steps.release.outputs.published }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main

      - name: Verify release run matches current main
        id: current
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          if [ "$actual" = "$EXPECTED_SHA" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping stale release run for $EXPECTED_SHA because main is $actual."
          fi

      - name: Set up Bun
        if: steps.current.outputs.current == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Release
        if: steps.current.outputs.current == 'true'
        id: release
        uses: openhoo/hooversion/actions/release@f5ee7eef255519b4ef33f4a93c7223805113c3a2
        with:
          version: ${{ env.HOOVERSION_VERSION }}
          bun-version: 1.3.14
          github-token: ${{ secrets.GITHUB_TOKEN }}
          install-command: bun install --frozen-lockfile

      - name: Set up Node for npm trusted publishing
        if: steps.current.outputs.current == 'true' && steps.release.outputs.published == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          package-manager-cache: false

      - name: Check published package version
        if: steps.current.outputs.current == 'true' && steps.release.outputs.published == 'true'
        id: package
        env:
          PACKAGE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          if bun info "@openhoo/hoopilot@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package for npm
        if: steps.current.outputs.current == 'true' && steps.release.outputs.published == 'true' && steps.package.outputs.exists != 'true'
        run: bun run build

      - name: Publish package to npm
        if: steps.current.outputs.current == 'true' && steps.release.outputs.published == 'true' && steps.package.outputs.exists != 'true'
        run: npm publish --access public --provenance --ignore-scripts --registry=https://registry.npmjs.org

  # The standalone binaries and the container image publish in separate,
  # independent jobs (both only consume the release job's outputs) so a slow or
  # flaky upload in one can never block the other.
  binaries:
    name: Attach standalone binaries
    needs: release
    if: needs.release.outputs.current == 'true' && needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone binaries
        run: bash scripts/build-binaries.sh "${{ needs.release.outputs.version }}"

      - name: Generate binary artifact attestations
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-path: dist/bin/**

      - name: Attach binaries to the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: v${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" dist/bin/hoopilot-* dist/bin/SHA256SUMS --clobber

  publish-image:
    name: Publish image to GHCR
    needs: release
    if: needs.release.outputs.current == 'true' && needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: docker_meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest

      - name: Build and push image to GHCR
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

      - name: Generate image artifact attestation
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
