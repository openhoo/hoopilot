services:
  hoopilot:
    build: .
    image: openhoo/hoopilot:local
    # Run as a service: restart unless explicitly stopped.
    restart: unless-stopped
    ports:
      - "127.0.0.1:4141:4141"
    environment:
      # This file publishes the proxy on loopback only (127.0.0.1, see `ports`
      # above), so no client API key is needed — the proxy is unreachable from
      # other hosts. The container binds 0.0.0.0 (required for port publishing),
      # which makes hoopilot fail closed by default, so we opt into running
      # without a key here. This is the keyless "just works" local path:
      #   docker compose up -d   # no key to generate, export, or sync
      HOOPILOT_ALLOW_UNAUTHENTICATED: ${HOOPILOT_ALLOW_UNAUTHENTICATED:-1}
      # Optional: require a client key. If you change the `ports` mapping to a
      # non-loopback interface, set a strong, unique key here — it takes
      # precedence and clients must send it as `Authorization: Bearer <key>` or
      # `x-api-key: <key>`. Generate one with: openssl rand -hex 24
      HOOPILOT_API_KEY: ${HOOPILOT_API_KEY:-}
      HOOPILOT_ACCESS_LOG: ${HOOPILOT_ACCESS_LOG:-0}
      HOOPILOT_USAGE_ACCOUNTING: ${HOOPILOT_USAGE_ACCOUNTING:-basic}
    volumes:
      # Persists the GitHub Copilot OAuth credential across restarts.
      - hoopilot-data:/data
    healthcheck:
      # /healthz is behind the API-key gate, so pass the key as x-api-key.
      test:
        - CMD
        - bun
        - -e
        - "const k=process.env.HOOPILOT_API_KEY;fetch('http://127.0.0.1:4141/healthz',{headers:k?{'x-api-key':k}:{}}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  hoopilot-data:
