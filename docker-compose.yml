services:
  hoopilot:
    build: .
    image: openhoo/hoopilot:local
    # Run as a service: restart unless explicitly stopped.
    restart: unless-stopped
    ports:
      - "127.0.0.1:4141:4141"
    environment:
      # The image binds 0.0.0.0 for Docker port publishing, so hoopilot fails
      # closed and refuses to start without authentication. Set a strong, unique
      # key before `docker compose up`, e.g.:
      #   export HOOPILOT_API_KEY=$(openssl rand -hex 24)
      # Leaving it unset makes the proxy exit on startup with a clear error.
      # Clients then send it as `Authorization: Bearer <key>` or `x-api-key: <key>`.
      HOOPILOT_API_KEY: ${HOOPILOT_API_KEY:-}
    volumes:
      # Persists the GitHub Copilot OAuth credential across restarts.
      - hoopilot-data:/data
    healthcheck:
      # /healthz is behind the API-key gate, so pass the key as x-api-key.
      test:
        - CMD
        - bun
        - -e
        - "const k=process.env.HOOPILOT_API_KEY;fetch('http://127.0.0.1:4141/healthz',{headers:k?{'x-api-key':k}:{}}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  hoopilot-data:
